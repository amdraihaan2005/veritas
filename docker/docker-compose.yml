services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    restart: unless-stopped

    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    restart: unless-stopped

    depends_on:
      - zookeeper

    ports:
      - "9092:9092"

    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1 || exit 1"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  postgres:
    image: postgres:17
    container_name: postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: unless-stopped

    ports:
      - "9090:9090"

    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider -q http://localhost:9090/-/healthy || exit 1"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: unless-stopped

    environment:
      GF_SERVER_ROOT_URL: "http://44.197.242.134/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"

    ports:
      - "3000:3000"

    volumes:
      - grafana_data:/var/lib/grafana

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider -q http://localhost:3000/api/health || exit 1"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  producer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.producer

    container_name: producer
    restart: unless-stopped

    depends_on:
      - kafka

    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}

  consumer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.consumer

    container_name: consumer
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      DATABASE_URL: ${DATABASE_URL}

  fastapi:
    build:
      context: ..
      dockerfile: docker/Dockerfile.fastapi

    container_name: fastapi
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      DATABASE_URL: ${DATABASE_URL}

    ports:
      - "8000:8000"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\""
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile

    container_name: frontend
    restart: unless-stopped

    depends_on:
      fastapi:
        condition: service_healthy

    ports:
      - "5173:5173"

volumes:
  postgres_data:
  grafana_data:
  prometheus_data:
